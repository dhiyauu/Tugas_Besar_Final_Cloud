services:

  user-service:
    image: user-service:latest
    ports:
      - "8081:8081"
    depends_on:
      - mysql

  order-service:
    image: order-service:latest
    ports:
      - "8083:8083"
    depends_on:
      - mysql

  tracking-service:
    image: tracking-service:latest
    ports:
      - "8084:8084"
    depends_on:
      - mysql

  gudang-service:
    image: gudang-service:latest
    ports:
      - "8085:8085"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: tubesdb

  courier-service:
    image: courier-service:latest
    ports:
      - "8086:8086"
    depends_on:
      - mysql

  report-service:
    image: report-service:latest
    ports:
      - "8087:8087"
    depends_on:
      - mysql

  payment-service:
    image: payment-service:latest
    ports:
      - "8088:8088"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: tubesdb

  mysql:
    image: mysql:8
    container_name: mysql-tubes
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

volumes:
  mysql_data:
